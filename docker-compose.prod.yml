version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: luciddrop-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  backend:
    build: ./backend
    container_name: luciddrop-backend
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/luciddrop?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - SOLANA_RPC=${SOLANA_RPC}
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: luciddrop-frontend
    restart: always
    environment:
      - REACT_APP_API_URL=https://api.luciddrop.com/api
      - REACT_APP_WS_URL=wss://api.luciddrop.com
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data: